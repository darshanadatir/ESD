<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Blog System</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;
  color: #333;
}

/* HEADER */
header {
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  letter-spacing: 1px;
}

/* FORM */
.container {
  max-width: 800px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  animation: fadeIn 0.6s ease;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 8px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  transition: 0.3s;
}

.add-btn {
  background: #28a745;
}

.add-btn:hover {
  background: #218838;
}

.posts {
  max-width: 800px;
  margin: auto;
}

/* POST CARD */
.post {
  background: white;
  margin: 20px 0;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
  animation: slideUp 0.5s ease;
  transition: transform 0.3s;
}

.post:hover {
  transform: translateY(-5px);
}

.post h2 {
  margin-bottom: 10px;
}

.post img {
  max-width: 100%;
  height: auto;
  margin: 10px 0;
  border-radius: 8px;
}

.actions {
  margin-top: 15px;
}

.delete {
  background: #dc3545;
}

.edit {
  background: #007bff;
  margin-right: 10px;
}

.delete:hover {
  background: #c82333;
}

.edit:hover {
  background: #0056b3;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes slideUp {
  from {
    transform: translateY(30px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* RESPONSIVE */
@media(max-width: 600px) {
  .container, .posts {
    width: 90%;
  }
}
</style>

</head>
<body>

<header>🚀 Advanced Blog Management System</header>

<div class="container">
  <input type="text" id="title" placeholder="Enter blog title">
  <textarea id="content" rows="4" placeholder="Write your blog..."></textarea>
  <input type="file" id="image" accept="image/*">
  <button class="add-btn" onclick="addPost()">Add Post</button>
</div>

<div class="posts" id="posts"></div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let editIndex = -1;

function displayPosts() {
  const postDiv = document.getElementById("posts");
  postDiv.innerHTML = "";

  posts.forEach((post, index) => {
    let imageHtml = post.image ? `<img src="${post.image}" alt="Post Image">` : '';
    postDiv.innerHTML += `
      <div class="post">
        <h2>${post.title}</h2>
        <p>${post.content}</p>
        ${imageHtml}
        <div class="actions">
          <button class="edit" onclick="editPost(${index})">Edit</button>
          <button class="delete" onclick="deletePost(${index})">Delete</button>
        </div>
      </div>
    `;
  });
}

function addPost() {
  let title = document.getElementById("title").value.trim();
  let content = document.getElementById("content").value.trim();
  let imageFile = document.getElementById("image").files[0];

  if (!title || !content) {
    alert("Fill all fields");
    return;
  }

  let imageData = null;
  if (imageFile) {
    const reader = new FileReader();
    reader.onload = function(e) {
      imageData = e.target.result;
      savePost(title, content, imageData);
    };
    reader.readAsDataURL(imageFile);
  } else {
    savePost(title, content, imageData);
  }
}

function savePost(title, content, image) {
  if (editIndex === -1) {
    posts.push({ title, content, image });
  } else {
    posts[editIndex] = { title, content, image };
    editIndex = -1;
  }

  localStorage.setItem("posts", JSON.stringify(posts));

  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
  document.getElementById("image").value = "";

  displayPosts();
}

function deletePost(index) {
  posts.splice(index, 1);
  localStorage.setItem("posts", JSON.stringify(posts));
  displayPosts();
}

function editPost(index) {
  document.getElementById("title").value = posts[index].title;
  document.getElementById("content").value = posts[index].content;
  // Note: Editing image is not implemented for simplicity; you can enhance this
  editIndex = index;
}

displayPosts();
</script>

</body>
</html>
